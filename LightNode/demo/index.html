<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LightNode v0.1 APP_FLOW Demo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="vscode">
      <div class="titlebar">
        <div class="titlebar__left">
          <div class="app-icon"></div>
          <div class="menu-dots"></div>
        </div>
        <div class="titlebar__center">
          <div class="nav-arrows">
            <span>&lt;</span>
            <span>&gt;</span>
          </div>
          <div class="search">
            <span class="search__icon">o</span>
            <span class="search__text">casual</span>
          </div>
        </div>
        <div class="titlebar__right">
          <div class="window-chip">A</div>
          <div class="window-chip">B</div>
          <div class="window-chip">X</div>
        </div>
      </div>

      <div class="workbench">
        <aside class="activitybar">
          <div class="activity active">E</div>
          <div class="activity">S</div>
          <div class="activity">G</div>
          <div class="activity badge">
            B
            <span>10</span>
          </div>
          <div class="activity">D</div>
          <div class="activity">X</div>
          <div class="activity">T</div>
          <div class="activity">P</div>
          <div class="activity spacer"></div>
          <div class="activity">U</div>
          <div class="activity">C</div>
        </aside>

        <aside class="sidebar">
          <div class="sidebar__header">
            <div>EXPLORER</div>
            <div class="ellipsis">…</div>
          </div>
          <div class="tree">
            <div class="tree__section">OPEN EDITORS</div>
            <div class="tree__section active">CASUAL</div>
            <div class="tree__section">OUTLINE</div>
            <div class="tree__section">TIMELINE</div>
          </div>
        </aside>

        <section class="editor">
          <div class="editor__content">
            <div class="watermark">V</div>
            <div class="quick-actions">
              <div class="quick-actions__row">
                <span>Open Chat</span>
                <span class="keys">Ctrl</span>
                <span class="keys">Alt</span>
                <span class="keys">I</span>
              </div>
              <div class="quick-actions__row">
                <span>Show All Commands</span>
                <span class="keys">Ctrl</span>
                <span class="keys">Shift</span>
                <span class="keys">P</span>
              </div>
              <div class="quick-actions__row">
                <span>Start Debugging</span>
                <span class="keys">F5</span>
              </div>
            </div>
          </div>
        </section>
      </div>

      <footer class="statusbar">
        <div class="statusbar__left">
          <span class="status-chip">x</span>
          <span class="status-chip">main*</span>
          <span class="status-chip">o</span>
        </div>
        <div class="statusbar__center">
          <span class="status-chip">0</span>
          <span class="status-chip">0</span>
        </div>
        <div class="statusbar__right">
          <span class="status-chip">o</span>
          <span class="status-chip">u</span>
          <span class="status-chip">!</span>
        </div>
      </footer>
    </div>
  </body>
</html>
